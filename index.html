<!DOCTYPE html>
<html>
<head>
    <title>ORION BOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; }
        #circleBtn {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            z-index: 99999999;
            border-radius: 50%;
            background: rgba(0, 100, 255, 0.2);
            border: 3px solid #0099ff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0,153,255,0.5);
        }
        #line {
            width: 60%;
            height: 3px;
            background: #0099ff;
            position: absolute;
        }
        #dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e0f7ff;
            position: absolute;
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>

<div id="circleBtn">
    <div id="line"></div>
    <div id="dot"></div>
</div>

<script>
    // ==============================================
    // DATA BARANG YANG MAU DIWAR
    // ==============================================
    const TARGETS = [
        "Velixir Parfum Icarus Eau de Parfum For Unisex",
        "Velixir Parfums Orion Eau de Parfum for unisex"
    ];
    const SIZE = "35ml";
    let isActive = false;
    let loopProcess = null;
    const btn = document.getElementById('circleBtn');

    // ==============================================
    // TOMBOL ON / OFF
    // ==============================================
    btn.onclick = function() {
        if(!isActive) {
            isActive = true;
            // Ubah jadi HIJAU saat NYALA
            btn.style.borderColor = "#33ff33";
            btn.style.background = "rgba(0,200,0,0.2)";
            document.getElementById('line').style.background = "#33ff33";
            document.getElementById('dot').style.background = "#ffffff";
            startBot();
            console.log("BOT NYALA - SIAP WAR");
        } else {
            isActive = false;
            // Balik jadi BIRU saat MATI
            btn.style.borderColor = "#0099ff";
            btn.style.background = "rgba(0,100,255,0.2)";
            document.getElementById('line').style.background = "#0099ff";
            document.getElementById('dot').style.background = "#e0f7ff";
            clearInterval(loopProcess);
            console.log("BOT MATI");
        }
    }

    // ==============================================
    // INTI PROGRAM BOT
    // ==============================================
    function startBot() {
        loopProcess = setInterval(() => {
            if(!isActive) return;

            // 1. CEK APAKAH BARANG YANG BENER
            let textContent = document.body.innerText;
            let isCorrectItem = TARGETS.some(nama => textContent.includes(nama));

            if(isCorrectItem) {
                console.log("BARANG KETEMU!");

                // 2. CARI TOMBOL BELI SEKARANG
                let buyButton = document.querySelector('button') || 
                                Array.from(document.querySelectorAll('button, div')).find(el => 
                                    el.textContent.includes("Beli Sekarang") && !el.disabled
                );

                if(buyButton) {
                    console.log("BISA DIKLIK! GO GO GO!");
                    
                    // KLIK BELI SEKARANG
                    buyButton.click();

                    setTimeout(() => {
                        // 3. PILIH UKURAN 35ml
                        let variant = Array.from(document.querySelectorAll('div, span, button')).find(el =>
                            el.textContent.includes(SIZE)
                        );
                        if(variant) variant.click();

                        setTimeout(() => {
                            // 4. KLIK BUAT PESANAN
                            let orderBtn = Array.from(document.querySelectorAll('button')).find(el =>
                                el.textContent.includes("Buat Pesanan")
                            );
                            if(orderBtn) orderBtn.click();

                            console.log("SELESAI! BARANG DAPET!");
                        }, 400);

                    }, 400);
                }
            }
        }, 150);
    }

    console.log("%c ORION BOT v4.0 ", "background:black; color:cyan; font-size:20px");
    console.log("Style: Persis seperti gambar");
</script>

</body>
</html>
