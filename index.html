<!DOCTYPE html>
<html>
<head>
    <title>ORION BOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: transparent; }
        #toggleBtn {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            z-index: 9999999;
            border-radius: 50%;
            background: #000033;
            border: 4px solid #0099ff;
            box-shadow: 0 0 20px #0099ff, inset 0 0 20px rgba(0,153,255,0.5);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #innerLine {
            width: 60%;
            height: 4px;
            background: #0099ff;
            position: absolute;
            box-shadow: 0 0 10px #0099ff;
        }
        #centerDot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #cceeff;
            position: absolute;
            box-shadow: 0 0 15px #ffffff;
        }
        #textLabel {
            position: absolute;
            bottom: -25px;
            font-family: Arial;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px black;
        }
    </style>
</head>
<body>

<div id="toggleBtn">
    <div id="innerLine"></div>
    <div id="centerDot"></div>
    <div id="textLabel">OFF</div>
</div>

<script>
    // ==============================================
    // LIST NAMA BARANG
    // ==============================================
    const TARGET_ITEMS = [
        "Velixir Parfum Icarus Eau de Parfum For Unisex",
        "Velixir Parfums Orion Eau de Parfum for unisex"
    ];
    const UKURAN = "35ml";
    let BOT_ON = false;
    let loop = null;

    // ==============================================
    // TOMBOL INTERAKTIF
    // ==============================================
    const btn = document.getElementById('toggleBtn');
    const label = document.getElementById('textLabel');

    btn.onclick = function() {
        if(!BOT_ON) {
            BOT_ON = true;
            btn.style.background = "#001133";
            btn.style.borderColor = "#33ff33";
            btn.style.boxShadow = "0 0 30px #33ff33, inset 0 0 20px rgba(51,255,51,0.5)";
            document.getElementById('innerLine').style.background = "#33ff33";
            document.getElementById('innerLine').style.boxShadow = "0 0 10px #33ff33";
            document.getElementById('centerDot').style.background = "#ffffff";
            label.innerText = "ON";
            label.style.color = "#33ff33";
            startBot();
        } else {
            BOT_ON = false;
            btn.style.background = "#000033";
            btn.style.borderColor = "#0099ff";
            btn.style.boxShadow = "0 0 20px #0099ff, inset 0 0 20px rgba(0,153,255,0.5)";
            document.getElementById('innerLine').style.background = "#0099ff";
            document.getElementById('innerLine').style.boxShadow = "0 0 10px #0099ff";
            document.getElementById('centerDot').style.background = "#cceeff";
            label.innerText = "OFF";
            label.style.color = "white";
            clearInterval(loop);
        }
    }

    // ==============================================
    // LOGIC BOT BELI OTOMATIS
    // ==============================================
    function startBot() {
        loop = setInterval(() => {
            if(!BOT_ON) return;

            // 1. CEK APAKAH NAMA BARANG SESUAI
            let pageText = document.body.innerText;
            let isTarget = TARGET_ITEMS.some(name => pageText.includes(name));

            if(isTarget) {
                // 2. CARI TOMBOL BELI SEKARANG
                let buyBtn = Array.from(document.querySelectorAll("button")).find(el => 
                    el.innerText.includes("Beli Sekarang") && !el.disabled
                );

                if(buyBtn) {
                    console.log("TARGET LOCKED! BUYING...");
                    
                    // KLIK BELI SEKARANG
                    buyBtn.click();

                    setTimeout(() => {
                        // 3. PILIH UKURAN 35ml
                        let varian = Array.from(document.querySelectorAll("div, span, button")).find(el =>
                            el.innerText.includes(UKURAN)
                        );
                        if(varian) varian.click();

                        setTimeout(() => {
                            // 4. KLIK BUAT PESANAN
                            let checkout = Array.from(document.querySelectorAll("button")).find(el =>
                                el.innerText.includes("Buat Pesanan")
                            );
                            if(checkout) checkout.click();

                            console.log("SUCCESS! BARANG KENA!");
                        }, 300);

                    }, 300);
                }
            }
        }, 100); // CEK SANGAT CEPAT
    }

    console.log("%c ORION BOT READY ", "background:black; color:lime; font-size:20px");
    console.log("Style: Blue Circle");
</script>

</body>
</html>
